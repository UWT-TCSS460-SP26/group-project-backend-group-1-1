openapi: 3.0.3
info:
  title: TCSS 460 Group Project API
  description: |
    **Team:** Nate, Harleen, Harsimar, Jonathan

    **Description:** A RESTful API for the TCSS 460 group project, proxying TMDB data for movies and TV shows through team-designed endpoints.

    **Deployed URL:** https://tcss460-team-1-api.onrender.com
  version: 0.1.0

servers:
  - url: https://tcss460-team-1-api.onrender.com
    description: Production
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Health check endpoints
  - name: Movies
    description: Movie search, popular, and detail endpoints
  - name: TV
    description: TV show search, popular, and detail endpoints
  - name: Ratings
    description: User-submitted numeric ratings for movies and TV shows
  - name: Reviews
    description: User-submitted text reviews for movies and TV shows
  - name: Auth
    description: |
      Authentication endpoints. The current `/auth/dev-login` is a Sprint 2 stand-in
      and will be replaced by the real auth provider in Sprint 3.

paths:
  /health:
    get:
      tags: [Health]
      summary: Health Check
      description: Returns the health status of the API.
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'GOOD'

  /movies/popular:
    get:
      tags: [Movies]
      summary: Popular Movies
      description: |
        Returns the most popular movies, sorted by popularity descending.
        Proxies TMDB's `/discover/movie` endpoint.
      parameters:
        - name: language
          in: query
          required: false
          description: BCP-47 language tag (e.g. `en-US`, `es-ES`, `ja-JP`).
          schema:
            type: string
            default: en-US
            example: en-US
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Paginated list of popular movies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularMoviesResponse'
        '500':
          description: TMDB API key not configured on the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TMDB unreachable or returned an invalid body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /movies/search:
    get:
      tags: [Movies]
      summary: Search Movies
      description: |
        Searches for movies by title. Requires the `query` parameter.
        Proxies TMDB's `/search/movie` endpoint.
      parameters:
        - name: query
          in: query
          required: true
          description: Title to search for.
          schema:
            type: string
            example: batman
        - name: language
          in: query
          required: false
          description: BCP-47 language tag (e.g. `en-US`, `es-ES`, `ja-JP`).
          schema:
            type: string
            default: en-US
            example: en-US
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Search results for movies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieSearchResponse'
        '400':
          description: Query parameter is missing or empty.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: TMDB API key not configured on the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TMDB unreachable or returned an invalid body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /movies/{id}:
    get:
      tags: [Movies]
      summary: Movie Details
      description: |
        Returns detailed information for a specific movie by TMDB ID.
        Proxies TMDB's `/movie/{id}` endpoint.
      parameters:
        - name: id
          in: path
          required: true
          description: TMDB movie ID.
          schema:
            type: integer
            example: 550
        - name: language
          in: query
          required: false
          description: BCP-47 language tag (e.g. `en-US`, `es-ES`, `ja-JP`).
          schema:
            type: string
            default: en-US
            example: en-US
      responses:
        '200':
          description: Detailed movie information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieDetailsResponse'
        '400':
          description: Movie ID is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Movie not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: TMDB API key not configured on the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TMDB unreachable or returned an invalid body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tv/popular:
    get:
      tags: [TV]
      summary: Popular TV Shows
      description: |
        Returns the most popular TV shows, sorted by popularity descending.
        Proxies TMDB's `/discover/tv` endpoint.
      parameters:
        - name: language
          in: query
          required: false
          description: BCP-47 language tag (e.g. `en-US`, `es-ES`, `ja-JP`).
          schema:
            type: string
            default: en-US
            example: en-US
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Paginated list of popular TV shows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularTvResponse'
        '500':
          description: TMDB API key not configured on the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TMDB unreachable or returned an invalid body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tv/search:
    get:
      tags: [TV]
      summary: Search TV Shows
      description: |
        Searches for TV shows by title. Requires the `query` parameter.
        Proxies TMDB's `/search/tv` endpoint.
      parameters:
        - name: query
          in: query
          required: true
          description: Title to search for.
          schema:
            type: string
            example: game of thrones
        - name: language
          in: query
          required: false
          description: BCP-47 language tag (e.g. `en-US`, `es-ES`, `ja-JP`).
          schema:
            type: string
            default: en-US
            example: en-US
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Search results for TV shows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TvSearchResponse'
        '400':
          description: Query parameter is missing or empty.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: TMDB API key not configured on the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TMDB unreachable or returned an invalid body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tv/{id}:
    get:
      tags: [TV]
      summary: TV Show Details
      description: |
        Returns detailed information for a specific TV show by TMDB ID.
        Proxies TMDB's `/tv/{id}` endpoint.
      parameters:
        - name: id
          in: path
          required: true
          description: TMDB TV show ID.
          schema:
            type: integer
            example: 1399
        - name: language
          in: query
          required: false
          description: BCP-47 language tag (e.g. `en-US`, `es-ES`, `ja-JP`).
          schema:
            type: string
            default: en-US
            example: en-US
      responses:
        '200':
          description: Detailed TV show information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TvDetailsResponse'
        '400':
          description: TV show ID is missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: TV show not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: TMDB API key not configured on the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream TMDB unreachable or returned an invalid body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/dev-login:
    post:
      tags: [Auth]
      summary: Dev Login (Sprint 2 only)
      description: |
        **Sprint 2 stand-in — DO NOT deploy publicly.**
        Accepts a username, find-or-creates a `User` row with `role='user'`,
        and returns a signed JWT. Does NOT validate a password.
        Replaced by the real auth integration in Sprint 3.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: alice
                email:
                  type: string
                  format: email
                  description: Optional. Defaults to `<username>@dev.local`.
                  example: alice@example.test
              required: [username]
      responses:
        '200':
          description: JWT for the (possibly newly created) user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: |
                      Signed JWT. Payload contains `{ sub, email, role, iat, exp }`.
                      Send as `Authorization: Bearer <token>` to authenticated endpoints.
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                required: [token]
        '400':
          description: '`username` is missing or not a string.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: '`JWT_SECRET` not configured on the server.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ratings:
    post:
      tags: [Ratings]
      summary: Create Rating
      description: Creates a numeric rating (0–10) for a movie or TV show, owned by the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingInput'
      responses:
        '201':
          description: Rating created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        '400':
          description: Invalid rating fields or score out of range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ratings/{id}:
    get:
      tags: [Ratings]
      summary: Get Rating by ID
      description: Returns a single rating by its primary key.
      parameters:
        - name: id
          in: path
          required: true
          description: Rating primary key.
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: The requested rating.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        '400':
          description: Invalid rating id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Rating not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Ratings]
      summary: Update Rating
      description: Updates the score of a rating owned by the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                score:
                  type: integer
                  minimum: 0
                  maximum: 10
                  example: 9
              required: [score]
      responses:
        '200':
          description: Updated rating.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        '400':
          description: Invalid id, invalid fields, or score out of range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller does not own this rating.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Rating not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Ratings]
      summary: Delete Rating
      description: Deletes a rating owned by the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Rating deleted.
        '400':
          description: Invalid rating id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller does not own this rating.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Rating not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ratings/media/{mediaType}/{tmdbId}:
    get:
      tags: [Ratings]
      summary: List Ratings for a Media Item
      description: Returns paginated ratings plus an aggregate average for a given TMDB media item.
      parameters:
        - name: mediaType
          in: path
          required: true
          schema:
            type: string
            enum: [movie, tv]
            example: tv
        - name: tmdbId
          in: path
          required: true
          schema:
            type: string
            example: '1399'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          description: Page size (capped at 50).
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Page of ratings with aggregate average.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingsListResponse'
        '400':
          description: Invalid mediaType or tmdbId.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reviews:
    post:
      tags: [Reviews]
      summary: Create Review
      description: |
        Creates a text review for a movie or TV show, owned by the authenticated user.
        A user can only review a given (mediaType, tmdbId) once — duplicates return 409.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInput'
      responses:
        '201':
          description: Review created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          description: 'Invalid review fields. Returns a `{ errors: { fieldErrors } }` envelope from Zod validation.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZodErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Caller has already reviewed this media item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reviews/media/{mediaType}/{tmdbId}:
    get:
      tags: [Reviews]
      summary: List Reviews for a Media Item
      description: Returns paginated reviews for a given TMDB media item, newest first.
      parameters:
        - name: mediaType
          in: path
          required: true
          schema:
            type: string
            enum: [movie, tv]
            example: tv
        - name: tmdbId
          in: path
          required: true
          schema:
            type: string
            example: '1399'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          description: Page size (capped at 50).
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Page of reviews.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewsListResponse'
        '400':
          description: Invalid mediaType, tmdbId, or pagination values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reviews/{id}:
    get:
      tags: [Reviews]
      summary: Get Review by ID
      description: Returns a single review by its primary key.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            example: 1
      responses:
        '200':
          description: The requested review.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          description: 'Invalid review id. Returns a `{ errors: { fieldErrors } }` envelope from Zod validation.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZodErrorResponse'
        '404':
          description: Review not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Reviews]
      summary: Update Review
      description: Updates the title and/or description of a review owned by the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewUpdateInput'
      responses:
        '200':
          description: Updated review.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          description: Invalid id, title, or description.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller does not own this review.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Review not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Reviews]
      summary: Delete Review
      description: Deletes a review. Allowed for the review's owner or any user with the `admin` role.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Review deleted.
        '400':
          description: Invalid review id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is neither the review's owner nor an admin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Review not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token issued by `POST /auth/dev-login` (dev) or the eventual auth provider.
        Send as `Authorization: Bearer <token>`.
  schemas:
    ErrorResponse:
      type: object
      description: |
        Standard error envelope returned on 4xx and 5xx responses.
        Note: Zod-validated endpoints (`POST /reviews`, `GET /reviews/{id}`)
        return a `ZodErrorResponse` instead.
      properties:
        error:
          type: string
          description: Human-readable description of the error.
          example: 'Missing required query parameter: query'
      required: [error]

    PopularMovieSummary:
      type: object
      description: |
        Trimmed movie shape returned by `GET /movies/popular`.
        Maps upstream TMDB field names to our public names.
      properties:
        id:
          type: integer
          description: TMDB movie ID.
          example: 640146
        title:
          type: string
          description: Movie title (mapped from upstream `original_title`).
          example: 'Ant-Man and the Wasp: Quantumania'
        overview:
          type: string
          description: Short plot synopsis.
          example: 'Super-Hero partners Scott Lang and Hope van Dyne...'
        poster_path:
          type: string
          nullable: true
          description: Relative poster image path. Prepend `https://image.tmdb.org/t/p/w500` for a full URL.
          example: '/ngl2FKBlU4fhbdsrtdom9LVLBXw.jpg'
        release_date:
          type: string
          format: date
          description: Theatrical release date (ISO 8601).
          example: '2023-02-15'
        language:
          type: string
          description: Original language code (mapped from upstream `original_language`).
          example: en
      required: [id, title, overview, poster_path, release_date, language]

    PopularMoviesResponse:
      type: object
      description: Envelope returned by `GET /movies/popular`.
      properties:
        language:
          type: string
          description: The BCP-47 language tag that was used for the upstream request.
          example: en-US
        page:
          type: integer
          description: Current page number.
          example: 1
        results:
          type: array
          items:
            $ref: '#/components/schemas/PopularMovieSummary'
      required: [language, page, results]

    MovieSearchResult:
      type: object
      description: Summary movie shape returned by `GET /movies/search`.
      properties:
        id:
          type: integer
          example: 550
        title:
          type: string
          example: 'Fight Club'
        overview:
          type: string
          example: 'An insomniac office worker and a devil-may-care soap maker...'
        poster_path:
          type: string
          nullable: true
          example: '/i8M6qh39uJVvP9w5ub-h0qMjFk5.jpg'
        release_date:
          type: string
          format: date
          example: '1999-10-15'
        language:
          type: string
          example: en
      required: [id, title, overview, poster_path, release_date, language]

    MovieSearchResponse:
      type: object
      description: Envelope returned by `GET /movies/search`.
      properties:
        query:
          type: string
          example: fight
        language:
          type: string
          example: en-US
        page:
          type: integer
          example: 1
        results:
          type: array
          items:
            $ref: '#/components/schemas/MovieSearchResult'
      required: [query, language, page, results]

    PopularTvSummary:
      type: object
      description: Trimmed TV show shape returned by `GET /tv/popular`.
      properties:
        id:
          type: integer
          example: 1399
        title:
          type: string
          description: TV show name (mapped from upstream `original_name`).
          example: 'Game of Thrones'
        overview:
          type: string
          example: 'Seven noble families fight for control of the lands of Westeros...'
        poster_path:
          type: string
          nullable: true
          description: Relative poster image path. Prepend `https://image.tmdb.org/t/p/w500` for a full URL.
          example: '/u3bZgnGQ9T01sWNhyveQz0wH0Hl.jpg'
        first_air_date:
          type: string
          format: date
          example: '2011-04-17'
        language:
          type: string
          description: Original language code (mapped from upstream `original_language`).
          example: en
      required: [id, title, overview, poster_path, first_air_date, language]

    PopularTvResponse:
      type: object
      description: Envelope returned by `GET /tv/popular`.
      properties:
        language:
          type: string
          description: The BCP-47 language tag used for the upstream request.
          example: en-US
        page:
          type: integer
          example: 1
        results:
          type: array
          items:
            $ref: '#/components/schemas/PopularTvSummary'
      required: [language, page, results]

    TvSearchResult:
      type: object
      description: Summary TV show shape returned by `GET /tv/search`.
      properties:
        id:
          type: integer
          example: 1399
