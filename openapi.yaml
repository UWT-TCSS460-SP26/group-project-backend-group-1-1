openapi: 3.0.3
info:
  title: TCSS 460 Group Project API
  description: |
    **Team:** Nate, Harleen, Harsimar, Jonathan

    **Description:** A RESTful API for the TCSS 460 group project, providing health monitoring and core functionality.

    **Deployed URL:** http://localhost:3000
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Health check endpoints

paths:
  /health:
    get:
      tags: [Health]
      summary: Health Check
      description: Returns the health status of the API.
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'GOOD'
