    Rating:
      type: object
      description: A user-submitted numeric rating for a TMDB media item.
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          description: ID of the user who owns this rating.
          example: 1
        score:
          type: integer
          minimum: 0
          maximum: 10
          example: 8
        tmdbId:
          type: string
          description: TMDB identifier for the rated media item.
          example: '1399'
        mediaType:
          type: string
          enum: [movie, tv]
          example: tv
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, score, tmdbId, mediaType]

    RatingInput:
      type: object
      description: Request body for `POST /ratings`.
      properties:
        tmdbId:
          type: string
          example: '1399'
        mediaType:
          type: string
          enum: [movie, tv]
          example: tv
        score:
          type: integer
          minimum: 0
          maximum: 10
          example: 8
      required: [tmdbId, mediaType, score]

    RatingsListResponse:
      type: object
      description: Paginated ratings list with aggregate average.
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          description: Total ratings for this media item across all pages.
          example: 1
        averageScore:
          type: number
          format: float
          description: Average score across all ratings for this media item. `0` when there are no ratings.
          example: 8
        results:
          type: array
          items:
            $ref: '#/components/schemas/Rating'
      required: [page, limit, total, averageScore, results]

    Review:
      type: object
      description: A user-submitted text review for a TMDB media item.
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        title:
          type: string
          example: 'Brilliant'
        description:
          type: string
          example: 'A masterpiece of modern cinema.'
        tmdbId:
          type: string
          example: '1399'
        mediaType:
          type: string
          enum: [movie, tv]
          example: tv
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, title, description, tmdbId, mediaType]

    ReviewInput:
      type: object
      description: |
        Request body for `POST /reviews`.
        `title` is optional — if omitted, the server generates `Review of {tmdbId}`.
        `body` is stored as the review's `description` field.
      properties:
        tmdbId:
          type: string
          minLength: 1
          example: '1399'
        mediaType:
          type: string
          enum: [movie, tv]
          example: tv
        title:
          type: string
          example: 'Brilliant'
        body:
          type: string
          minLength: 1
          maxLength: 5000
          description: The review text. Stored as `description` on the response.
          example: 'A masterpiece of modern cinema.'
      required: [tmdbId, mediaType, body]

    ReviewUpdateInput:
      type: object
      description: |
        Request body for `PUT /reviews/{id}`. All fields optional —
        only provided fields are written.
      properties:
        title:
          type: string
          example: 'Brilliant (revised)'
        description:
          type: string
          example: 'On rewatch, even better than I remembered.'

    ReviewsListResponse:
      type: object
      description: Paginated reviews list for `GET /reviews/media/{mediaType}/{tmdbId}`.
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        results:
          type: array
          items:
            $ref: '#/components/schemas/Review'
      required: [page, limit, results]

    ZodErrorResponse:
      type: object
      description: |
        Error envelope returned when Zod validation fails (currently `POST /reviews`
        and `GET /reviews/{id}`). Each key in `errors` is a field name and maps to
        an array of human-readable error messages.
      properties:
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            body: ['Review body cannot be empty']
            mediaType: ['Invalid input']
      required: [errors]
