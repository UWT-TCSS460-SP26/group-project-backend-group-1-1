openapi: 3.0.3
info:
  title: TCSS 460 Group Project API
  description: |
    **Team:** OYaml

    **Description:** A RESTful API for the TCSS 460 group project, providing health monitoring and core functionality.

    **Deployed URL:** https://tcss460-team-1-api.onrender.com/health
  version: 0.1.0

servers:
  - url: https://tcss460-team-1-api.onrender.com
    description: Production

tags:
  - name: Health
    description: Health check endpoints
  - name: Movies
    description: Movie search, popular, and detail endpoints
  - name: TV
    description: TV show search, popular, and detail endpoints

paths:
  /health:
    get:
      tags: [Health]
      summary: Health Check
      description: Returns the health status of the API.
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'GOOD'

  /movies/popular:
    get:
      tags: [Movies]
      summary: Popular Movies
      description: |
        Proxies TMDB's `/discover/movie?sort_by=popularity.desc` endpoint and
        returns a trimmed response envelope suitable for list/grid views.

        Reference implementation for all TMDB proxy routes — see
        `src/routes/moviesPopular.ts` for the pattern to copy when adding
        new proxy endpoints.
      parameters:
        - name: language
          in: query
          required: false
          description: BCP-47 language tag (e.g. `en-US`, `es-ES`, `ja-JP`).
          schema:
            type: string
            default: en-US
            example: en-US
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Paginated list of popular movies (trimmed schema).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopularMoviesResponse'
        '500':
          description: TMDB API key not configured on the server.
        '502':
          description: Upstream TMDB unreachable or returned an invalid body.
  /movies/{id}:
    get:
      tags: [Movies]
      summary: Movie Details
      description: |
        Retrieves detailed information for a specific movie by ID.

        This endpoint proxies TMDB's movie details endpoint and returns a
        simplified response shape for the frontend.
      parameters:
        - name: id
          in: path
          required: true
          description: TMDB movie ID.
          schema:
            type: integer
            example: 550
        - name: language
          in: query
          required: false
          description: BCP-47 language tag (e.g. `en-US`, `es-ES`, `ja-JP`).
          schema:
            type: string
            default: en-US
            example: en-US
      responses:
        '200':
          description: Detailed movie information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieDetailsResponse'
        '400':
          description: Movie ID is missing or invalid.
        '500':
          description: TMDB API key not configured on the server.
        '502':
          description: Upstream TMDB unreachable or returned an invalid body.

  /movies/search:
    get:
      tags: [Movies]
      summary: Movie Search
      description: |
        Searches TMDB movies by query and returns a simplified search result
        envelope with only the fields needed by the frontend.
      parameters:
        - name: query
          in: query
          required: true
          description: Text query to search movie titles.
          schema:
            type: string
            example: batman
        - name: language
          in: query
          required: false
          description: BCP-47 language tag (e.g. `en-US`, `es-ES`, `ja-JP`).
          schema:
            type: string
            default: en-US
            example: en-US
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Search results for movies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieSearchResponse'
        '400':
          description: Query parameter is required.
        '500':
          description: TMDB API key not configured on the server.
        '502':
          description: Upstream TMDB unreachable or returned an invalid body.

  /tv/{id}:
    get:
      tags: [TV]
      summary: TV Show Details
      description: |
        Retrieves detailed information for a specific TV show by ID.

        This endpoint proxies TMDB's TV details endpoint and returns a
        simplified response shape for the frontend.
      parameters:
        - name: id
          in: path
          required: true
          description: TMDB TV show ID.
          schema:
            type: integer
            example: 1399
        - name: language
          in: query
          required: false
          description: BCP-47 language tag (e.g. `en-US`, `es-ES`, `ja-JP`).
          schema:
            type: string
            default: en-US
            example: en-US
      responses:
        '200':
          description: Detailed TV show information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TvDetailsResponse'
        '400':
          description: TV show ID is missing or invalid.
        '500':
          description: TMDB API key not configured on the server.
        '502':
          description: Upstream TMDB unreachable or returned an invalid body.

  /tv/search:
    get:
      tags: [TV]
      summary: TV Show Search
      description: |
        Searches TMDB TV shows by query and returns a simplified search result
        envelope with only the fields needed by the frontend.
      parameters:
        - name: query
          in: query
          required: true
          description: Text query to search TV show names.
          schema:
            type: string
            example: game of thrones
        - name: language
          in: query
          required: false
          description: BCP-47 language tag (e.g. `en-US`, `es-ES`, `ja-JP`).
          schema:
            type: string
            default: en-US
            example: en-US
        - name: page
          in: query
          required: false
          description: 1-based page number.
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Search results for TV shows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TvSearchResponse'
        '400':
          description: Query parameter is required.
        '500':
          description: TMDB API key not configured on the server.
        '502':
          description: Upstream TMDB unreachable or returned an invalid body.

components:
  schemas:
    PopularMovieSummary:
      type: object
      description: |
        Trimmed movie shape returned by `GET /movies/popular`.
        Maps upstream TMDB field names to our public names.
      properties:
        id:
          type: integer
          description: TMDB movie ID.
          example: 640146
        title:
          type: string
          description: Movie title (mapped from upstream `original_title`).
          example: 'Ant-Man and the Wasp: Quantumania'
        overview:
          type: string
          description: Short plot synopsis.
          example: 'Super-Hero partners Scott Lang and Hope van Dyne...'
        poster_path:
          type: string
          nullable: true
          description: Relative poster image path. Prepend `https://image.tmdb.org/t/p/w500` for a full URL.
          example: '/ngl2FKBlU4fhbdsrtdom9LVLBXw.jpg'
        release_date:
          type: string
          format: date
          description: Theatrical release date (ISO 8601).
          example: '2023-02-15'
        language:
          type: string
          description: Original language code (mapped from upstream `original_language`).
          example: en
      required: [id, title, overview, poster_path, release_date, language]

    PopularMoviesResponse:
      type: object
      description: Envelope returned by `GET /movies/popular`.
      properties:
        language:
          type: string
          description: The BCP-47 language tag that was used for the upstream request.
          example: en-US
        page:
          type: integer
          description: Current page number.
          example: 1
        results:
          type: array
          items:
            $ref: '#/components/schemas/PopularMovieSummary'
      required: [language, page, results]

    MovieSearchResult:
      type: object
      description: Summary movie shape returned by `GET /movies/search`.
      properties:
        id:
          type: integer
          example: 550
        title:
          type: string
          example: 'Fight Club'
        overview:
          type: string
          example: 'An insomniac office worker and a devil-may-care soap maker...'
        poster_path:
          type: string
          nullable: true
          example: '/i8M6qh39uJVvP9w5ub-h0qMjFk5.jpg'
        release_date:
          type: string
          format: date
          example: '1999-10-15'
        language:
          type: string
          example: en
      required: [id, title, overview, poster_path, release_date, language]

    MovieSearchResponse:
      type: object
      description: Envelope returned by `GET /movies/search`.
      properties:
        query:
          type: string
          example: fight
        language:
          type: string
          example: en-US
        page:
          type: integer
          example: 1
        results:
          type: array
          items:
            $ref: '#/components/schemas/MovieSearchResult'
      required: [query, language, page, results]

    TvSearchResult:
      type: object
      description: Summary TV show shape returned by `GET /tv/search`.
      properties:
        id:
          type: integer
          example: 1399
        title:
          type: string
          example: 'Game of Thrones'
        overview:
          type: string
          example: 'Seven noble families fight for control of the mythical land of Westeros.'
        posterPath:
          type: string
          nullable: true
          example: '/tv-poster.jpg'
        firstAirDate:
          type: string
          format: date
          example: '2011-04-17'
        year:
          type: integer
          nullable: true
          example: 2011
        originalLanguage:
          type: string
          example: en
      required: [id, title, overview, posterPath, firstAirDate, year, originalLanguage]

    TvSearchResponse:
      type: object
      description: Envelope returned by `GET /tv/search`.
      properties:
        query:
          type: string
          example: throne
        language:
          type: string
          example: en-US
        page:
          type: integer
          example: 1
        results:
          type: array
          items:
            $ref: '#/components/schemas/TvSearchResult'
      required: [query, language, page, results]

    MovieDetailsResponse:
      type: object
      description: Detailed movie information returned by `GET /movies/{id}`.
      properties:
        id:
          type: integer
          example: 550
        title:
          type: string
          example: 'Fight Club'
        overview:
          type: string
          example: 'A ticking-time-bomb insomniac and a slippery soap salesman...'
        poster_path:
          type: string
          nullable: true
          example: '/jSziioSwPVrOy9Yow3XhWIBDjq1.jpg'
        backdrop_path:
          type: string
          nullable: true
          example: '/c6OLXfKAk5BKeR6broC8pYiCquX.jpg'
        release_date:
          type: string
          format: date
          example: '1999-10-15'
        language:
          type: string
          example: en
        rating:
          type: number
          format: float
          example: 8.4
        runtime:
          type: integer
          example: 139
        genres:
          type: array
          items:
            type: string
          example: ['Drama', 'Thriller']
      required:
        [
          id,
          title,
          overview,
          poster_path,
          backdrop_path,
          release_date,
          language,
          rating,
          runtime,
          genres,
        ]

    TvDetailsResponse:
      type: object
      description: Detailed TV show information returned by `GET /tv/{id}`.
      properties:
        id:
          type: integer
          example: 1399
        title:
          type: string
          example: 'Game of Thrones'
        overview:
          type: string
          example: 'Seven noble families fight for control of the mythical land of Westeros.'
        poster_path:
          type: string
          nullable: true
          example: '/tv-poster.jpg'
        backdrop_path:
          type: string
          nullable: true
          example: '/tv-backdrop.jpg'
        first_air_date:
          type: string
          format: date
          example: '2011-04-17'
        language:
          type: string
          example: en
        rating:
          type: number
          format: float
          example: 8.5
        number_of_seasons:
          type: integer
          example: 8
        number_of_episodes:
          type: integer
          example: 73
        status:
          type: string
          example: 'Ended'
        genres:
          type: array
          items:
            type: string
          example: ['Sci-Fi & Fantasy']
      required:
        [
          id,
          title,
          overview,
          poster_path,
          backdrop_path,
          first_air_date,
          language,
          rating,
          number_of_seasons,
          number_of_episodes,
          status,
          genres,
        ]
